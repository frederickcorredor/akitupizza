<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aki Tu Pizza | Menú Digital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">AKI TU <span>PIZZA</span></div>
            <a href="https://linktr.ee/akitupizza" class="btn-contact">Ubicación</a>
        </nav>
        <div class="hero">
            <h1>Sabor Artesanal en Piedecuesta</h1>
            <p>Pizzas premium, clásicas y coctelería de autor.</p>
        </div>
    </header>

    <main class="container">
        <section class="menu-section">
            <h2 class="section-title">Nuestras Pizzas</h2>
            <div class="filter-tabs">
                <button class="tab-btn active" onclick="filterMenu('todas')">Todas</button>
                <button class="tab-btn" onclick="filterMenu('premium')">Premium</button>
                <button class="tab-btn" onclick="filterMenu('especial')">Especiales</button>
                <button class="tab-btn" onclick="filterMenu('clasica')">Clásicas</button>
            </div>

            <div id="pizza-grid" class="grid">
                </div>
        </section>

        <section class="menu-section">
            <h2 class="section-title">Bebidas y SouBar</h2>
            <div id="bebida-grid" class="grid">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Aki Tu Pizza Piedecuesta - Cero Alcohol, Full Actitud.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
